        .box {

            padding: 20px;

        }
        button {
            padding: 10px 20px;
            background: orange;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
        }
    </style>
</head>
<body>

<h1>⭐ نجم للتعليم ⭐</h1>
<p>مرحبا بيك 👋</p>

<div class="box">
    <h2>📘 رياضيات</h2>
    <button>ادخل</button>
</div>

<div class="box">
    <h2>📖 عربية</h2>
    <button>ادخل</button>
</div>

<div class="box">
    <h2>🇫🇷 Français</h2>
    <button>ادخل</button>
</div>

<div class="box">
    <h2>🇬🇧 English</h2>
    <button>ادخل</button>
</div>

</body>
</html>
